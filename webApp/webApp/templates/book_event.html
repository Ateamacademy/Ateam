<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Event</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            overflow-y: auto;
            max-height: 90vh;
        }
        .hidden {
            display: none;
        }
        .fade-enter {
            opacity: 0;
        }
        .fade-enter-active {
            transition: opacity 0.5s;
            opacity: 1;
        }
        .event-buttons button, .time-buttons button {
            margin: 5px;
            background-color: #0264A0;
            color: white;
        }
        .selected {
            background-color: #0245a8 !important;
            color: white !important;
        }
        .event-buttons button:hover, .time-buttons button:hover {
            background-color: #0245a8;
        }
        .btn {
            background-color: #0264A0;
        }
        .floating-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(2, 100, 160, 0.2);
            animation: float 20s infinite ease-in-out;
        }
        .circle:nth-child(1) {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 30%;
        }
        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            left: 70%;
        }
        .circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 10%;
        }
        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }
        @media (max-width: 600px) {
            .event-buttons button, .time-buttons button {
                width: 100%;
                margin: 5px 0;
            }
        }
        .logo {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 100px;
        }

        .time-btn {
            background-color: #d4424c;
        }

        
    </style>
</head>
<body>
    <div class="floating-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
        <h2 class="center-align" style="font-family: 'Bebas Neue'">Book Event</h2>
        <form method="POST" action="{{ url_for('book_event') }}">
            <div class="event-selection">
                <label>Select Event:</label><br>
                <div class="event-buttons">
                    {% for event in events %}
                    <button type="button" class="btn event-btn" data-event-id="{{ event.id }}">
                        {{ event.name }} {{ event.date }} 
                    </button>
                    {% endfor %}
                </div>
                <input type="hidden" id="event" name="event" required>
            </div>
            <div class="time-selection hidden">
                <label>Select Start Time:</label><br>
                <div class="time-buttons" id="time-buttons-container">
                    <!-- Time buttons will be dynamically populated here -->
                </div>
                <input type="hidden" id="start_time" name="start_time" required>
            </div>
            <div class="user-details hidden">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" class="validate" required><br>
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" class="validate" required><br>
                <label for="phone">Your Phone:</label>
                <input type="tel" id="phone" name="phone" class="validate" required><br>
                <button type="submit" class="btn">Book Slot</button>
            </div>
        </form>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const eventButtons = document.querySelectorAll('.event-btn');
            const eventInput = document.getElementById('event');
            const timeInput = document.getElementById('start_time');
            const timeSelection = document.querySelector('.time-selection');
            const timeButtonsContainer = document.getElementById('time-buttons-container');
            const userDetails = document.querySelector('.user-details');
    
            eventButtons.forEach(button => {
                button.addEventListener('click', function() {
                    eventButtons.forEach(btn => btn.classList.remove('selected'));
                    button.classList.add('selected');
                    const eventId = button.getAttribute('data-event-id');
                    eventInput.value = eventId;
    
                    // Fetch available times for the selected event
                    fetch(`/get_available_times/${eventId}`)
                        .then(response => response.json())
                        .then(times => {
                            // Clear existing time buttons
                            timeButtonsContainer.innerHTML = '';
    
                            // Add new time buttons
                            times.forEach(time => {
                                const timeButton = document.createElement('button');
                                timeButton.type = 'button';
                                timeButton.className = 'btn time-btn';
                                timeButton.dataset.time = time;
                                timeButton.style.backgroundColor = '#d4424c';
                                timeButton.textContent = time;
    
                                timeButton.addEventListener('click', function() {
                                    document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('selected'));
                                    timeButton.classList.add('selected');
                                    timeInput.value = time;
                                    userDetails.classList.remove('hidden');
                                    fadeIn(userDetails);
                                });
    
                                timeButtonsContainer.appendChild(timeButton);
                            });
    
                            timeSelection.classList.remove('hidden');
                            fadeIn(timeSelection);
                        });
                });
            });
        });
    
        function fadeIn(element) {
            element.classList.add('fade-enter');
            setTimeout(() => {
                element.classList.add('fade-enter-active');
                setTimeout(() => {
                    element.classList.remove('fade-enter');
                    element.classList.remove('fade-enter-active');
                }, 500);
            }, 10);
        }
    </script>
    
</body>
</html>
