<!DOCTYPE html>
<html lang="en">

<head>
    <title>A-Team Academy Log in</title>
    <link rel="stylesheet" href="static/css/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3HHJ0RP8MJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-3HHJ0RP8MJ');
    </script>
</head>

<body>

    <div class="Title">
        <img src='static/images/logo.png' style="border-radius:10px; opacity: 0.9" />
        <h1>A-Team Academy</h1>
        <p>Please log in to your account to view work and classes</p>
    </div>

    <div class="main">
        <input type="checkbox" id="chk" aria-hidden="true">

        <div class="signup">
            <label for="chk" aria-hidden="true">Sign up as a new Student</label>
            <a href="student_reg"> <button>Sign up</button> </a>
        </div>

        <div class="login">
            <form method="POST">
                <label for="chk" aria-hidden="true">Login</label>
                <input type="email" name="email" placeholder="Email" required="">
                <input type="password" name="password" placeholder="Password" required="">
                <button>Login</button>
            </form>
        </div>
    </div>

    <!-- JavaScript alert for error message -->
    {% if error %}
    <script>
        alert("{{ error }}");
    </script>
    {% endif %}
    
</body>

</html>
