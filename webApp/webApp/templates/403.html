<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden — A-Team Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--brand-600:#6d53ec;--brand-700:#5b41d6;--brand-50:#f5f3ff;--canvas:#f6f5fb;--ink:#1e1b39;--ink-muted:#6e6b8f;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
            background:radial-gradient(1200px 600px at 50% -10%,var(--brand-50),var(--canvas));
            min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);}
        .card{max-width:500px;width:100%;text-align:center;background:#fff;border-radius:24px;
            padding:44px 36px;box-shadow:0 20px 50px -24px rgba(46,35,103,.28);}
        .code{font-size:4.5rem;font-weight:800;line-height:1;letter-spacing:-0.03em;
            background:linear-gradient(135deg,var(--brand-600),var(--brand-700));
            -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
        h1{font-size:1.35rem;font-weight:800;margin:14px 0 10px;}
        p{color:var(--ink-muted);font-size:.95rem;line-height:1.6;margin-bottom:10px;}
        .btn{display:inline-block;margin-top:20px;background:var(--brand-600);color:#fff;
            font-weight:700;text-decoration:none;padding:13px 26px;border-radius:14px;
            box-shadow:0 10px 26px -12px rgba(46,35,103,.5);transition:.15s;}
        .btn:hover{background:var(--brand-700);}
    </style>
</head>
<body>
    <div class="card">
        <div class="code">403</div>
        <h1>Access denied</h1>
        <p>It seems you don't have permission to access this page. This is likely because you are not logged in or your account is no longer active.</p>
        <p>Please return home and sign in with your credentials. If you believe this is a mistake, contact a member of the team.</p>
        <a class="btn" href="/">Return home</a>
    </div>
</body>
</html>
