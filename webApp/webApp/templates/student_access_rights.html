<!DOCTYPE html>

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Student Access Rights</title>

    <!-- Custom fonts for this template-->
    <link href="static/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="static/css/sb-admin-2.min.css" rel="stylesheet">

</head>


{% extends 'base_page.html' %}

{% block middleContent %}

<script>
    $( document ).ready(function() {
        document.getElementById("student-link").classList.add("active");
    });
</script>


<!-- Page Heading -->
<div class="d-sm-flex align-items-center justify-content-between mb-4 mt-4">
    <h1 class="h3 mb-0 text-gray-800">Student Access Rights</h1>

</div>

<!-- Content Row -->
<div class="row">

    <!-- Area Chart -->
    <div class="col">
        <div class="card shadow mb-4">
            <div
                class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                <h6 class="m-0 font-weight-bold text-primary"> Abilities </h6>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                        <th scope="col"> Name </th>
                        <th scope="col"> Log on </th>
                        <th scope="col"> See All work </th>
                        
                        </tr>
                    </thead>
                    <tbody>

                    {% for student in students %}
                        <tr>
                        <th scope="row"> {{ student.name }} </th>
                        {% if student.log_on %} <td>  <input type="checkbox" checked onchange="updateRights('{{ student.id }}', 'log_on', this.checked)"> </td> {% else %} <td>  <input type="checkbox" onchange="updateRights('{{ student.id }}', 'log_on', this.checked)"> </td> {% endif %}
                        {% if student.see_all_work %} <td>  <input type="checkbox" checked onchange="updateRights('{{ student.id }}', 'see_all_work', this.checked)"> </td> {% else %} <td>  <input type="checkbox" onchange="updateRights('{{ student.id }}', 'see_all_work', this.checked)"> </td> {% endif %}
                        
                        </tr>
                    {% endfor %}

                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script> 
        function updateRights(studentID, key, checked) {
            
            $.ajax({
                url: '/updateStudentAccessRights',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({"studentID" : studentID, "key" : key, "value" : checked}),
                success: function(response) {
                },
                error: function(error) {
                    alert("Unfortunately the Access Rights couldnt be updated please try again because of Error".concat(error))
                    console.log(error);
                }

            })
        }
    </script>
</div>




    <!-- Bootstrap core JavaScript-->
    <script src="static/vendor/jquery/jquery.min.js"></script>
    <script src="static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="static/vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="static/javascript/sb-admin-2.min.js"></script>

    <!-- Page level plugins -->
    <script src="static/vendor/chart.js/Chart.min.js"></script>

    <!-- Page level custom scripts -->
    <script src="static/javascript/demo/chart-area-demo.js"></script>
    <script src="static/javascript/demo/chart-pie-demo.js"></script>


{% endblock %}
