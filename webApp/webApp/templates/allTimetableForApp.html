<!DOCTYPE html>
<html lang="en">
<head>
    <title>Timetable</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/i18n/defaults-*.min.js"></script>  
    
    <link rel="stylesheet" href="static\css\background.css" />  
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="static/javascript/js/timetable.js-master/dist/styles/timetablejs.css">

    <script src="static/javascript/js/timetable.js-master/dist/scripts/timetable.js"></script>
</head>

<div class="row mt-4">

    <div class="col mb-4 ml-3"> 

        <div class="row row-12 mb-4" style="width:100%;">
            <div class="card text-center" style="width:100%;">
                <div class="card-body">
                    <div class="row">
                        <div class="col"> <a href = "allTimetableForApp?offset={{ request.args['offset']|int - 1 }}"> <button class="btn btn-secondary"> Back a Day </button> </a> </div>
                        <div class="col"> <h2> {{ day }} </h2> </div>
                        <div class="col"> <a href = "allTimetableForApp?offset={{ request.args['offset']|int + 1 }}"> <button class="btn btn-secondary"> Forward a Day </button> </a> </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="timetable row">
        </div>

    </div>
</div>

<script>
    var items = {"COV-1" : [], "COV-2" : [], "COV-3" : [], "COV-4" : [], "COV-5" : [], "COV-6" : [], "SOHO-1" : [], "SOHO-2" : [], "SOHO-3" : [], "SOHO-4" : [], "SOHO-5" : [], "ONLINE-1" : [], "ONLINE-2" : [], "ONLINE-3" : [], "ONLINE-4" : [], "ONLINE-5" : []}

    function assignRoom(centreName, start, end, num, lesson) {
        if(centreName == "Coventry Road")
        {
            var list = items["COV-".concat(String(num))]
            for(i in list) 
            {
                var current = list[i];
                var currentStart = parseFloat(parseInt(current.startHour) + (parseInt(current.startMinute))/100);
                var currentEnd = parseFloat(parseInt(current.endHour) + (parseInt(current.startHour))/100);

                if( ((parseFloat(start) >= currentStart && parseFloat(start) < currentEnd) ||  (parseFloat(end) > currentStart && parseFloat(end) <= currentEnd) ) || (parseFloat(start) == currentStart && parseFloat(end) == currentEnd))
                    {
                        return assignRoom(centreName, start, end, num+1, lesson);
                    }
            }
            items["COV-".concat(String(num))].push(lesson);
            return "COV-".concat(String(num))
        }

        else if(centreName == "Soho Road") 
        {
            var list = items["SOHO-".concat(String(num))]
            for(i in list) 
            {
                var current = list[i];
                var currentStart = parseFloat(parseInt(current.startHour) + (parseInt(current.startMinute))/100);
                var currentEnd = parseFloat(parseInt(current.endHour) + (parseInt(current.startHour))/100);
                if( ((parseFloat(start) >= currentStart && parseFloat(start) < currentEnd) ||  (parseFloat(end) > currentStart && parseFloat(end) <= currentEnd) ) || (parseFloat(start) == currentStart && parseFloat(end) == currentEnd))
                    {
                        return assignRoom(centreName, start, end, num+1, lesson);
                    }

            }
            items["SOHO-".concat(String(num))].push(lesson);
            return "SOHO-".concat(String(num))
        }
        else if(centreName == "Online") 
        {
            var list = items["ONLINE-".concat(String(num))]
            for(i in list) 
            {
                var current = list[i];
                var currentStart = parseFloat(parseInt(current.startHour) + (parseInt(current.startMinute))/100);
                var currentEnd = parseFloat(parseInt(current.endHour) + (parseInt(current.startHour))/100);
                if( ((parseFloat(start) >= currentStart && parseFloat(start) < currentEnd) ||  (parseFloat(end) > currentStart && parseFloat(end) <= currentEnd) ) || (parseFloat(start) == currentStart && parseFloat(end) == currentEnd))
                    {
                        return assignRoom(centreName, start, end, num+1, lesson);
                    }

            }
            items["ONLINE-".concat(String(num))].push(lesson);
            return "ONLINE-".concat(String(num))
        }

    };


    window.onload = function() {generateTimetable();};
    
    function generateTimetable() {
        var timetable = new Timetable();
        items = {"COV-1" : [], "COV-2" : [], "COV-3" : [], "COV-4" : [], "COV-5" : [], "COV-6" : [], "SOHO-1" : [], "SOHO-2" : [], "SOHO-3" : [], "SOHO-4" : [], "SOHO-5" : [], "ONLINE-1" : [], "ONLINE-2" : [], "ONLINE-3" : [], "ONLINE-4" : [], "ONLINE-5" : []}
        var rows = {{ rows|tojson }};
        var lessons = {{ lesson2|tojson }};
        var role = {{ role|tojson }}

        timetable.setScope(7, 22); // optional, only whole hours between 0 and 23
        //timetable.useTwelveHour(); //optional, displays hours in 12 hour format (1:00PM)
        timetable.addLocations(rows);


        if(role == "admin") {
        
            for(i in lessons) {
                var start = parseFloat( parseInt(lessons[i].startHour) + parseFloat((lessons[i].startMinute / 100)) );
                var end = parseFloat( parseInt(lessons[i].endHour) + parseFloat((lessons[i].endMinute / 100))) ;

                assignRoom(lessons[i].centre, start, end, 1, lessons[i])
            }

            for(const property in items) {
                for(i in items[property] ) {
                    var options = {
                        url: '/Classroom_View_Home?lessonid='.concat( items[property][i].lessonID).concat("&year=").concat( items[property][i].year).concat("&weekNo=").concat( {{ weekNo|tojson }} ), // makes the event clickable
                        class: 'vip', // additional css class
                        data: { // each property will be added to the data-* attributes of the DOM node for this event
                            id: 4,
                            ticketType: 'VIP'
                        },
                        onClick: function(event, timetable, clickEvent) {} // custom click handler, which is passed the event object and full timetable as context  
                    };

                    timetable.addEvent(items[property][i].title.concat(" - ").concat(items[property][i].tutor),
                                        property, 
                                        new Date(2015,7,17,parseInt(items[property][i].startHour),parseInt(items[property][i].startMinute)), 
                                        new Date(2015,7,17,parseInt(items[property][i].endHour), parseInt(items[property][i].endMinute)),
                                        options );

                };

            };
        };

        if(role == "tutor" )  {
            for(i in lessons ) {
                    var options = {
                        url: '/Classroom_View_Home?lessonid='.concat( lessons[i].lessonID).concat("&year=").concat( lessons[i].year).concat("&weekNo=").concat( {{ weekNo|tojson }} ), // makes the event clickable
                        class: 'vip', // additional css class
                        data: { // each property will be added to the data-* attributes of the DOM node for this event
                            id: 4,
                            ticketType: 'VIP'
                        },
                        onClick: function(event, timetable, clickEvent) {} // custom click handler, which is passed the event object and full timetable as context  
                    };

                    timetable.addEvent(lessons[i].title.concat(" - ").concat(lessons[i].tutor), 
                                        lessons[i].day, 
                                        new Date(2015,7,17,parseInt(lessons[i].startHour),parseInt(lessons[i].startMinute)), 
                                        new Date(2015,7,17,parseInt(lessons[i].endHour), parseInt(lessons[i].endMinute)),
                                        options );

                };
        }
        
        
        var renderer = new Timetable.Renderer(timetable);
        renderer.draw('.timetable'); // any css selector
    };

</script>
