
<head>
    <title>Report Card Generator</title>
</head>

{% extends 'base_page.html' %}

{% block middleContent %}
<div class="container mt-5">
    <h2 class="text-center">Student Grade Reports</h2>

    <!-- Date Range Selection -->
    <div class="row mt-4">
        <div class="col-md-6">
            <label for="startDate">Start Date:</label>
            <input type="date" id="startDate" class="form-control">
        </div>
        <div class="col-md-6">
            <label for="endDate">End Date:</label>
            <input type="date" id="endDate" class="form-control">
        </div>
    </div>
    <button class="btn btn-primary mt-3" onclick="fetchReport()">Generate Report</button>
    <button class="btn btn-success mt-3 ml-2" data-toggle="modal" data-target="#sendReportModal">Send Grades</button>

    <!-- Student Grade Reports -->
    <div id="studentReports" class="mt-5">
        <!-- Reports will load here dynamically -->
    </div>

    <!-- Send Grades Modal -->
    <div class="modal fade" id="sendReportModal" tabindex="-1" aria-labelledby="sendReportModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sendReportModalLabel">Send Report Cards</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="reportTitle">Title</label>
                        <input type="text" id="reportTitle" class="form-control" placeholder="Enter report title" required>
                    </div>
                    <div class="form-group">
                        <label for="extraText">Additional Message</label>
                        <textarea id="extraText" class="form-control" rows="3" placeholder="Any extra text..."></textarea>
                    </div>
                    <p><strong>Date Range:</strong> <span id="dateRangeText"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="sendReport()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function fetchReport() {
        const startDate = document.getElementById("startDate").value;
        const endDate = document.getElementById("endDate").value;

        if (!startDate || !endDate) {
            alert("Please select both start and end dates.");
            return;
        }

        // AJAX Request to fetch reports
        fetch(`/generate_grades_report?start_date=${startDate}&end_date=${endDate}`)
            .then(response => response.json())
            .then(data => displayReports(data))
            .catch(error => console.error('Error:', error));
    }

    function displayReports(data) {
        const reportContainer = document.getElementById("studentReports");
        reportContainer.innerHTML = '';

        data.forEach(student => {
            let studentReport = `<h3>${student.studentName}</h3>`;
            studentReport += `
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Test Name</th>
                            <th>Date</th>
                            <th>Total Marks</th>
                            <th>Mark</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody>`;
            student.tests.forEach(test => {
                studentReport += `
                    <tr>
                        <td>${test.name}</td>
                        <td>${test.date}</td>
                        <td>${test.total}</td>
                        <td>${test.mark}</td>
                        <td>${test.grade}</td>
                    </tr>`;
            });
            studentReport += `</tbody></table>`;
            reportContainer.innerHTML += studentReport;
        });
    }

    // Send the report with additional info
    function sendReport() {
        const title = document.getElementById("reportTitle").value.trim();
        const extraText = document.getElementById("extraText").value.trim();
        const startDate = document.getElementById("startDate").value;
        const endDate = document.getElementById("endDate").value;


        if (!title || !startDate || !endDate) {
            alert("Please enter a title and select both start and end dates.");
            return;
        }

        const data = { "title": title, "extraText": extraText, "start_date": startDate, "end_date": endDate };

        fetch('/send_all_report_cards', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                alert("Report cards sent successfully!");
                $('#sendReportModal').modal('hide');
            } else {
                alert("Error sending report cards.");
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>
{% endblock %}
