<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance — A-Team Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--brand-500:#8b6df6;--brand-700:#5b41d6;--brand-900:#2e2367;}
        body {
            font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
            margin: 0; padding: 24px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--brand-700), var(--brand-900));
            color: #fff;
        }
        .container { text-align: center; max-width: 620px; }
        .slideshow-container img { max-width: 220px !important; height: auto !important;
            border-radius: 18px; box-shadow: 0 20px 50px -18px rgba(0,0,0,.5); }
        h1 { font-size: 2.4em; font-weight: 800; letter-spacing: -0.02em; color: #fff; margin-top: 8px; }
        p { font-size: 1.05em; color: rgba(255,255,255,.85); line-height: 1.6; max-width: 500px; margin: 8px auto; }
        .dot { height: 10px; width: 10px; margin: 0 4px; background: rgba(255,255,255,.35);
            border-radius: 50%; display: inline-block; transition: .3s; }
        .dot.active { background: #fff; }
        .loader {
            border: 6px solid rgba(255,255,255,.2);
            border-top: 6px solid var(--brand-500);
            border-radius: 50%; width: 56px; height: 56px;
            animation: spin 1s linear infinite; margin: 24px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">

        <div class="slideshow-container">

            <div class="mySlides fade">
#              <Img src="/static/images/logo_glowing.jpg" height = "600px" width = "600px">
            </div>
            
            <div class="mySlides fade">
              <img src="/static/images/logo-street.png" height = "600px" width = "600px">
            </div>
            
            <div class="mySlides fade">
              <Img src="/static/images/logo-winter.png" height = "600px" width = "600px">
            </div>

            <div class="mySlides fade">
                <Img src="/static/images/logo-hut.png" height = "600px" width = "600px">
            </div>

              <div class="mySlides fade">
                <Img src="/static/images/logo-classroom.png" height = "600px" width = "600px">
            </div>
            
        </div>
        <br>
        
        <div style="text-align:center">
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 

        </div>
        
        <script>
        let slideIndex = 0;
        showSlides();
        
        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex-1].style.display = "block";  
            dots[slideIndex-1].className += " active";
            setTimeout(showSlides, 2000); // Change image every 2 seconds
        }
        </script>

        <h1>Under Maintenance</h1>
        <p>We apologize for the inconvenience but ateamacad.co.uk is currently undergoing maintenance. </p>
        <p>We are building lots of new features that we think you'll really like! </p>
        <p>For any urgent issues or if you still need site access, please contact Safwaan (safwaan@ateamacademy.co.uk) </p>

    </div>
</body>
</html>
