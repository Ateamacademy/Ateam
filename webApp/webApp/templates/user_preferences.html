{% extends "base_page.html" %}

{% block middleContent %}
<div class="container mt-5">
    <h2>User Preferences</h2>
    <div class="mt-4">
        <h4>Choose Color Theme</h4>
        <button class="btn btn-primary" data-toggle="modal" data-target="#themeModal">Select Theme</button>
    </div>
</div>

<!-- Theme Selection Modal -->
<div class="modal fade" id="themeModal" tabindex="-1" aria-labelledby="themeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="themeModalLabel">Select a Color Theme</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    {% for theme in themes %}
                    <div class="col-md-4 text-center">
                        <img src="/static/images/themes/{{theme}}.png"
                             alt="{{ theme }}" class="img-fluid mb-3" style="cursor: pointer;" 
                             onclick="changeAttribute('theme', '{{ theme }}')">
                        <p>{{ theme }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changeAttribute(key, value) {
        // Send the selected theme to the Flask route
        fetch('/update_preference', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ key: key, value: value })
        })
        .then(response => {
            if (response.ok) {
                alert("Theme updated successfully!");
                location.reload(); // Reload to apply the new theme
            } else {
                alert("Failed to update theme. Please try again.");
            }
        })
        .catch(error => {
            console.error('Error updating theme:', error);
        });
    }
</script>
{% endblock %}
